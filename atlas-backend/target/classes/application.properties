# ============================================
# ATLAS Academy Backend - application.properties
# ============================================

spring.application.name=atlas-academy-backend

# ---------- Server ----------
server.port=8080
server.servlet.context-path=/api

# ---------- MySQL Database ----------
# Create the database first: CREATE DATABASE atlas_academy;
spring.datasource.url=jdbc:mysql://localhost:3306/atlas_academy?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------- JPA / Hibernate ----------
# update -> auto creates/updates tables based on entities. Good for dev.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ---------- Gmail SMTP (for sending OTP emails) ----------
# IMPORTANT: This must be a Gmail "App Password", NOT your normal Gmail password.
# Steps to generate one:
#  1. Enable 2-Step Verification on your Google account
#  2. Go to https://myaccount.google.com/apppasswords
#  3. Generate a 16-character app password for "Mail"
#  4. Paste that 16-char password below (remove spaces)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=youremail@gmail.com
spring.mail.password=YOUR_16_CHAR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from-name=ATLAS Academy

# ---------- OTP Settings ----------
app.otp.length=6
app.otp.expiry-minutes=5
# Max OTP requests allowed per email within the cooldown window (basic spam guard)
app.otp.resend-cooldown-seconds=60

# ---------- JWT ----------
# Generate your own long random secret for production! (this is just a dev placeholder)
app.jwt.secret=ChangeThisToALongRandomSecretKeyAtLeast256BitsForHS256AlgoSecurity
app.jwt.expiration-ms=86400000

# ---------- CORS ----------
# Add your deployed frontend URL(s) here, comma separated
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ---------- File upload (gallery images) ----------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# ---------- Seed Admin ----------
# This admin is auto-created on first startup if no admin with this email exists.
# Add more admins later by inserting rows directly into the `admins` table.
app.seed.admin-email=admin@atlasacademy.in
app.seed.admin-name=Admin
